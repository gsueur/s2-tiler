<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>s2-tiler preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; height: 100vh; }

    #toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 14px; background: #1e1e1e; border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #toolbar h1 { font-size: 14px; font-weight: 600; color: #aaa; letter-spacing: .05em; }
    #tileset-tabs { display: flex; gap: 6px; }
    .tab {
      padding: 4px 12px; border-radius: 4px; border: 1px solid #444;
      background: #2a2a2a; color: #ccc; cursor: pointer; font-size: 13px;
      transition: background .15s;
    }
    .tab:hover { background: #333; }
    .tab.active { background: #2563eb; border-color: #2563eb; color: #fff; }

    #server-url-wrap { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    #server-url-wrap label { font-size: 12px; color: #666; }
    #server-url { background: #2a2a2a; border: 1px solid #444; color: #ccc; border-radius: 4px; padding: 3px 8px; font-size: 12px; width: 200px; }

    #status { font-size: 12px; color: #888; white-space: nowrap; }
    #status.ok  { color: #4ade80; }
    #status.err { color: #f87171; }

    #progress-bar-wrap {
      position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 2000;
      pointer-events: none;
    }
    #progress-bar {
      height: 100%; width: 0%; background: #2563eb;
      transition: width .15s ease, opacity .4s ease;
      opacity: 0;
    }

    #map { flex: 1; }

    #info-panel {
      position: absolute; bottom: 24px; left: 14px; z-index: 1000;
      background: rgba(20,20,20,.85); backdrop-filter: blur(4px);
      border: 1px solid #333; border-radius: 6px;
      padding: 8px 12px; font-size: 12px; color: #bbb; min-width: 240px;
      line-height: 1.8;
    }
    #info-panel strong { color: #eee; }
    #info-panel hr { border: none; border-top: 1px solid #333; margin: 5px 0; }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>s2-tiler</h1>
  <div id="tileset-tabs"><!-- populated by JS --></div>
  <div id="server-url-wrap">
    <label for="server-url">Server</label>
    <input id="server-url" type="text" value="http://localhost:3000">
    <button class="tab" onclick="reload()">↺</button>
  </div>
  <span id="status">connecting…</span>
</div>

<div style="position:relative;flex:1;display:flex;flex-direction:column;">
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="map"></div>
  <div id="info-panel">
    <div>Tileset: <strong id="ip-name">—</strong></div>
    <div>Scenes: <strong id="ip-scenes">—</strong></div>
    <div>Years: <strong id="ip-years">—</strong></div>
    <div>Season: <strong id="ip-season">—</strong></div>
    <div>Bands: <strong id="ip-bands">—</strong></div>
    <div>Composite: <strong id="ip-composite">—</strong></div>
    <div>Extent: <strong id="ip-extent">—</strong></div>
    <hr>
    <div>Zoom: <strong id="ip-zoom">—</strong></div>
    <div>Tile: <strong id="ip-tile">—</strong></div>
    <div>Coords: <strong id="ip-coords">—</strong></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const BASE_LAYER = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd', maxZoom: 20
  });

  const map = L.map('map', { layers: [BASE_LAYER], zoomControl: true }).setView([42.36, -71.06], 11);

  // Track mouse position
  map.on('mousemove', e => {
    document.getElementById('ip-coords').textContent =
      `${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`;
    const z = map.getZoom();
    const tx = Math.floor((e.latlng.lng + 180) / 360 * Math.pow(2, z));
    const ty = Math.floor((1 - Math.log(Math.tan(e.latlng.lat * Math.PI / 180) + 1 / Math.cos(e.latlng.lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, z));
    document.getElementById('ip-tile').textContent = `${z}/${tx}/${ty}`;
  });
  map.on('zoom', updateZoom);

  function updateZoom() {
    document.getElementById('ip-zoom').textContent = map.getZoom();
  }
  updateZoom();

  let s2Layer = null;
  let currentTileset = null;
  let tilesets = [];

  // Tile loading progress
  let tilesLoading = 0;
  let tilesTotal = 0;
  const bar = document.getElementById('progress-bar');

  function tileStart() {
    if (tilesLoading === 0) {
      tilesTotal = 0;
      bar.style.opacity = '1';
    }
    tilesLoading++;
    tilesTotal++;
    bar.style.width = Math.min(tilesLoading / tilesTotal * 100, 95) + '%';
  }

  function tileEnd() {
    tilesLoading = Math.max(0, tilesLoading - 1);
    const pct = tilesTotal > 0 ? (1 - tilesLoading / tilesTotal) * 100 : 100;
    bar.style.width = pct + '%';
    if (tilesLoading === 0) {
      bar.style.width = '100%';
      setTimeout(() => { bar.style.opacity = '0'; bar.style.width = '0%'; }, 400);
    }
  }

  // Initialise server URL from ?server= query param, fall back to localhost
  const defaultServer = new URL(location.href).searchParams.get('server') || 'http://localhost:3000';
  document.getElementById('server-url').value = defaultServer;

  function serverUrl() {
    return document.getElementById('server-url').value.replace(/\/$/, '');
  }

  async function loadTilesets() {
    const base = serverUrl();
    const statusEl = document.getElementById('status');
    try {
      const res = await fetch(`${base}/tilesets`);
      if (!res.ok) throw new Error(res.statusText);
      tilesets = await res.json(); // string[]
      statusEl.textContent = `${tilesets.length} tileset(s) loaded`;
      statusEl.className = 'ok';
      renderTabs();
      if (tilesets.length > 0) selectTileset(tilesets[0]);
    } catch (e) {
      statusEl.textContent = `Cannot reach ${base} — ${e.message}`;
      statusEl.className = 'err';
    }
  }

  function renderTabs() {
    const wrap = document.getElementById('tileset-tabs');
    wrap.innerHTML = '';
    tilesets.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (name === currentTileset ? ' active' : '');
      btn.textContent = name;
      btn.onclick = () => selectTileset(name);
      wrap.appendChild(btn);
    });
  }

  async function selectTileset(name) {
    currentTileset = name;
    renderTabs();

    const base = serverUrl();

    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    // Fetch info + config for sidebar
    try {
      const [info, cfg] = await Promise.all([
        fetch(`${base}/${name}/info`).then(r => r.json()),
        fetch(`${base}/${name}/config`).then(r => r.json()),
      ]);
      document.getElementById('ip-name').textContent = name;
      document.getElementById('ip-scenes').textContent = info.scene_count ?? '—';
      document.getElementById('ip-years').textContent = cfg.years?.join(', ') ?? '—';
      document.getElementById('ip-season').textContent = cfg.season?.length
        ? cfg.season.map(m => MONTHS[m - 1]).join(', ')
        : 'full year';
      document.getElementById('ip-bands').textContent = cfg.bands?.join(', ') ?? '—';
      document.getElementById('ip-composite').textContent = cfg.composite ?? '—';
      const [w, s, e, n] = cfg.extent ?? [];
      document.getElementById('ip-extent').textContent =
        cfg.extent ? `${w}, ${s} → ${e}, ${n}` : '—';
    } catch (_) {}

    // Fetch TileJSON for bounds + zoom range
    let tj;
    try {
      tj = await fetch(`${base}/${name}/tilejson.json`).then(r => r.json());
    } catch (e) {
      console.warn('TileJSON failed', e);
    }

    // Remove existing S2 layer
    if (s2Layer) { map.removeLayer(s2Layer); s2Layer = null; }

    const tileUrl = `${base}/${name}/{z}/{x}/{y}?format=png`;
    s2Layer = L.tileLayer(tileUrl, {
      minZoom:     tj?.minzoom ?? 10,
      maxZoom:     tj?.maxzoom ?? 15,
      maxNativeZoom: tj?.maxzoom ?? 15,
      opacity:     1,
      tileSize:    256,
      attribution: 'Sentinel-2 L2A / s2-tiler',
      // Show tile load errors visually
      errorTileUrl: 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'
    });

    s2Layer.on('tileloadstart', tileStart);
    s2Layer.on('tileload', tileEnd);
    s2Layer.on('tileerror', e => { tileEnd(); console.warn('Tile error', e.coords); });

    s2Layer.addTo(map);

    // Fly to extent center at zoom 10 so tiles load immediately
    if (tj?.bounds) {
      const [w, s, e, n] = tj.bounds;
      const centerLat = (s + n) / 2;
      const centerLng = (w + e) / 2;
      map.setView([centerLat, centerLng], 10);
    }
  }

  function reload() {
    loadTilesets();
  }

  // Also update zoom display on move
  map.on('moveend', updateZoom);

  // Initial load
  loadTilesets();

  // Reload if server URL changes (on Enter)
  document.getElementById('server-url').addEventListener('keydown', e => {
    if (e.key === 'Enter') reload();
  });
</script>
</body>
</html>
