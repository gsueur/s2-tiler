# S2 Tiler — example configuration
# Copy to config.yaml and adjust extents, years, and presets.

# ── Global ────────────────────────────────────────────────────────────────────

port: 3000
minzoom: 10
maxzoom: 15
quadkey_zoom: 8

stac_url: https://earth-search.aws.element84.com/v1
collection: sentinel-2-l2a

# Shared DuckDB file for all mosaic indices (optional; omit to disable persistence)
index_path: tilesets.db

# Tile cache backend (optional; default: memory)
tile_cache:
  backend: memory   # none | memory | local | duckdb | s3 | r2

# ── Visual presets ────────────────────────────────────────────────────────────
# Define bands, rescale, and composite strategy once.
# Tilesets reference a preset by name via `preset:`.

presets:

  # Natural look
  truecolor:
    bands: [B04, B03, B02]
    rescale: [0, 3000]
    composite: best_pixel

  # Vegetation appears red — classic remote sensing look
  # Use case: vegetation health, land cover, deforestation
  falsecolor:
    bands: [B08, B04, B03]
    rescale: [0, 4000]
    composite: best_pixel

  # Agriculture and land use (vegetation = green/cyan, bare soil = pink/magenta)
  agriculture:
    bands: [B11, B08, B02]
    rescale: [0, 4000]
    composite: best_pixel

  # Fire, burn scars, active geology
  swir:
    bands: [B12, B08, B04]
    rescale: [0, 5000]
    composite: best_pixel

  # Geology, lithology, moisture content
  geology:
    bands: [B12, B11, B02]
    rescale: [0, 5000]
    composite: best_pixel

  # Plant stress, canopy structure
  rededge:
    bands: [B07, B05, B02]
    rescale: [0, 4000]
    composite: best_pixel

  # Normalized Difference Vegetation Index
  # rescale: [-1, 1] for full range; [0, 1] to emphasise green vegetation
  ndvi:
    bands: [B08, B04]
    rescale: [-1, 1]
    composite: ndvi

# ── Tilesets ──────────────────────────────────────────────────────────────────

tilesets:

  - name: massachusetts-truecolor
    preset: truecolor
    extent: [-73.6, 41.2, -69.8, 42.9]   # [west, south, east, north] WGS84
    years: [2023, 2024]
    season: [6, 7, 8]                     # June–August; omit for full year
    max_cloud_cover: 20
    max_scenes_per_tile: 12
    temporal_priority: true               # sort by year/month proximity before cloud cover

  - name: massachusetts-falsecolor
    preset: falsecolor
    extent: [-73.6, 41.2, -69.8, 42.9]
    years: [2023, 2024]
    season: [6, 7, 8]
    max_cloud_cover: 20
    max_scenes_per_tile: 12

  - name: massachusetts-ndvi
    preset: ndvi
    extent: [-73.6, 41.2, -69.8, 42.9]
    years: [2023, 2024]
    season: [6, 7, 8]
    max_cloud_cover: 20
    max_scenes_per_tile: 12
